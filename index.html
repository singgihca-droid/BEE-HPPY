<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pagi Ceria 🌞</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive;
        background: linear-gradient(to bottom, #87CEEB, #FFFACD);
        text-align: center;
        padding: 20px;
    }

    h1 {
        color: #FF8C00;
    }

    p {
        font-size: 18px;
    }

    #gameArea {
        position: relative;
        width: 300px;
        height: 300px;
        background: #ffffffaa;
        border-radius: 20px;
        margin: 20px auto;
        overflow: hidden;
        border: 3px dashed #FFA500;
    }

    #sun {
        font-size: 40px;
        position: absolute;
        cursor: pointer;
        user-select: none;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        border-radius: 10px;
        border: none;
        background: #FFB347;
        cursor: pointer;
    }

    button:hover {
        background: #FFA500;
    }
</style>
</head>
<body>

<h1>☀️ Selamat Pagi, Pejuang Kasur! ☀️</h1>
<p>
Semoga pagimu lebih cerah dari matahari,<br>
lebih hangat dari kopi,<br>
dan lebih manis dari senyum kamu 😆
</p>

<h2>🎮 Game: Tangkap Matahari Pagi!</h2>
<p>Klik matahari sebanyak mungkin sebelum waktunya habis!</p>

<div id="gameArea">
    <div id="sun">🌞</div>
</div>

<p>⏱️ Waktu: <span id="time">10</span> detik</p>
<p>⭐ Skor: <span id="score">0</span></p>

<button onclick="startGame()">Mulai Game</button>

<script>
let score = 0;
let timeLeft = 10;
let gameInterval;
let timer;

const sun = document.getElementById("sun");
const gameArea = document.getElementById("gameArea");

function moveSun() {
    const maxX = gameArea.clientWidth - 40;
    const maxY = gameArea.clientHeight - 40;

    sun.style.left = Math.random() * maxX + "px";
    sun.style.top = Math.random() * maxY + "px";
}

sun.onclick = () => {
    score++;
    document.getElementById("score").innerText = score;
    moveSun();
};

function startGame() {
    score = 0;
    timeLeft = 10;
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = timeLeft;

    moveSun();

    clearInterval(gameInterval);
    clearInterval(timer);

    gameInterval = setInterval(moveSun, 700);

    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;

        if (timeLeft <= 0) {
            clearInterval(gameInterval);
            clearInterval(timer);
            alert("🌞 Game selesai!\nSkor kamu: " + score + "\nSemoga pagimu makin cerah!");
        }
    }, 1000);
}
</script>

</body>
</html>
